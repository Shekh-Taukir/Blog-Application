<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blogs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- main css -->
    <link rel="stylesheet" href="../CSS/index.css">

    <!-- css for login popup modal -->
    <link rel="stylesheet" href="../CSS/new-login.css">

</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">My Blog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="index_navbar">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                    <li class="nav-item" id="login-nav-item">
                        <a class="nav-link" href="#">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Popup Login Modal -->
    <div class="container" id="login-modal">
        <!-- Login Modal -->
        <div id="loginModal" class="modal-overlay">
            <div class="modal-content">
                <button class="close-btn" id="closeModal">✖</button>
                <div class="modal-header">User Login</div>
                <div class="modal-body">
                    <p>Welcome! Please enter your username and password to access the exclusive content.</p>
                </div>
                <form id="loginForm">
                    <label for="user_id">Username:</label>
                    <input type="text" id="user_id" name="user_id" required>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                    <p class="error-message" id="errorMessage">Both fields are required! 1</p>
                    <p class="error-message" id="invalidErrorMsg">Invalid username or password!!</p>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container my-5">
        <h1 class="text-center mb-4">Latest Blogs</h1>
        <div class="container my-5" id="blog_container">

        </div>
    </div>

    <!-- js scripts -->
    <script src="../JavaScripts/base.js"></script>
    <script src="../JavaScripts/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
